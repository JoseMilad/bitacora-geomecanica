<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenido — Bitácora Geomecánica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--sidebar-bg) 0%, #1e3a5f 50%, var(--secondary) 100%);
      color: #fff;
    }
    .welcome-card {
      text-align: center;
      max-width: 600px;
      padding: 3rem 2.5rem;
    }
    .welcome-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }
    .welcome-title {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .welcome-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2rem;
    }
    .welcome-features {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .feature-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .feature-badge i {
      color: var(--accent);
    }
    .btn-welcome {
      padding: 0.75rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
    }
    .welcome-version {
      margin-top: 2rem;
      font-size: 0.75rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <div class="welcome-icon">
      <i class="fa-solid fa-mountain-sun"></i>
    </div>
    <h1 class="welcome-title">Bitácora Geomecánica</h1>
    <p class="welcome-subtitle">Plataforma empresarial para gestión de bitácora geomecánica minera</p>

    <div class="welcome-features">
      <div class="feature-badge">
        <i class="fa-solid fa-clipboard-list"></i> Registro de Bitácora
      </div>
      <div class="feature-badge">
        <i class="fa-solid fa-layer-group"></i> Sostenimiento Diario
      </div>
      <div class="feature-badge">
        <i class="fa-solid fa-chart-bar"></i> Dashboard & Reportes
      </div>
      <div class="feature-badge">
        <i class="fa-solid fa-camera"></i> Registro Fotográfico
      </div>
      <div class="feature-badge">
        <i class="fa-solid fa-hard-hat"></i> Gestión de Labores
      </div>
      <div class="feature-badge">
        <i class="fa-solid fa-users"></i> Multi-usuario
      </div>
    </div>

    <a href="/dashboard" class="btn btn-primary btn-welcome">
      <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar a la plataforma
    </a>

    <p class="welcome-version">
      <i class="fa-solid fa-circle-info me-1"></i> v{{ app_version }}
    </p>
  </div>
</body>
</html>
