<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — Bitácora Geomecánica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .login-header {
      background: var(--sidebar-bg);
      color: #fff;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .login-header i { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .login-header h4 { margin: 0; font-weight: 700; }
    .login-header small { color: var(--sidebar-text); font-size: 0.8rem; }
    .login-body { padding: 2rem; }
    .login-body .form-label { font-weight: 600; font-size: 0.85rem; }
    .login-footer {
      text-align: center;
      padding: 0.75rem 2rem 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card card border-0">
    <div class="login-header">
      <i class="fa-solid fa-user-plus d-block"></i>
      <h4>Crear Cuenta</h4>
      <small>Regístrate para acceder a la plataforma</small>
    </div>
    <div class="login-body">
      {% if flash and flash.mensaje %}
      <div class="alert alert-{{ 'success' if flash.tipo == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-{{ 'circle-check' if flash.tipo == 'success' else 'circle-xmark' }} me-2"></i>
        {{ flash.mensaje }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}

      <form method="POST" action="/auth/registro">
        <div class="mb-3">
          <label class="form-label">
            <i class="fa-solid fa-id-card me-1"></i>Nombre completo
          </label>
          <input type="text" name="nombre" class="form-control" placeholder="Ingrese su nombre"
            autocomplete="name" />
        </div>
        <div class="mb-3">
          <label class="form-label">
            <i class="fa-solid fa-user me-1"></i>Usuario <span class="text-danger">*</span>
          </label>
          <input type="text" name="username" class="form-control" placeholder="Elija un nombre de usuario"
            required autofocus autocomplete="username" />
        </div>
        <div class="mb-3">
          <label class="form-label">
            <i class="fa-solid fa-lock me-1"></i>Contraseña <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <input type="password" name="password" id="regPwd1" class="form-control"
              placeholder="Mínimo 4 caracteres" required autocomplete="new-password" />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('regPwd1','regPwdIcon1')">
              <i class="fa-solid fa-eye" id="regPwdIcon1"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">
            <i class="fa-solid fa-lock me-1"></i>Confirmar Contraseña <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <input type="password" name="password2" id="regPwd2" class="form-control"
              placeholder="Repita la contraseña" required autocomplete="new-password" />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('regPwd2','regPwdIcon2')">
              <i class="fa-solid fa-eye" id="regPwdIcon2"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="fa-solid fa-user-plus me-2"></i>Crear Cuenta
        </button>
      </form>
    </div>
    <div class="login-footer">
      <a href="/auth/login" class="text-decoration-none">
        <i class="fa-solid fa-arrow-left me-1"></i>¿Ya tienes cuenta? Iniciar sesión
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  function togglePwd(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const ico = document.getElementById(iconId);
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.className = 'fa-solid fa-eye-slash';
    } else {
      inp.type = 'password';
      ico.className = 'fa-solid fa-eye';
    }
  }
  </script>
</body>
</html>
